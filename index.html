<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bharat 24 Taas Citizen Reporter</title>

<meta property="og:description" content="तुमच्या परिसरातील बातमी, फोटो आणि व्हिडिओ थेट Bharat 24 Taas पर्यंत पोहोचवा.">
<meta property="og:image" content="https://citizen.bharat24taas.com/citizenreporter.png">

<meta name="twitter:card" content="summary_large_image">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f5f5;color:#222}
.header{background:linear-gradient(135deg,#b30000,#ff0000);padding:20px;text-align:center;color:#fff}
.logo{max-width:260px;width:100%;background:#fff;padding:8px;border-radius:10px}
.tag{margin-top:10px}
.social{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:10px;background:#fff}
.social a{text-decoration:none;color:#b30000;font-weight:bold;font-size:14px}
.breaking{background:#000;color:#fff;padding:10px;text-align:center;font-weight:bold}
.container{max-width:850px;margin:20px auto;padding:15px}
.card{background:#fff;padding:25px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.card h2{text-align:center;color:#b30000;margin-bottom:15px}
.notice{background:#fff3cd;padding:12px;border-radius:8px;margin-bottom:15px}
label{display:block;margin:12px 0 5px;font-weight:bold}
input,select,textarea{width:100%;padding:12px;border:1px solid #ccc;border-radius:8px}
textarea{height:140px}
button{width:100%;padding:15px;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:18px;font-weight:bold;margin-top:15px;cursor:pointer}
.footer{background:#111;color:#fff;text-align:center;padding:20px;margin-top:20px}
.footer a{color:#ffd700;text-decoration:none}
</style>
</head>
<body>

<div class="header">
<img src="revised_b24t_logo.png" class="logo" alt="Bharat 24 Taas Logo">
<h2 class="tag">Citizen Reporter Network</h2>
</div>

<div class="social">
<a href="https://www.bharat24taas.com" target="_blank">Website</a>
<a href="https://www.youtube.com/@Bharat24Taas" target="_blank">YouTube</a>
<a href="https://www.facebook.com/Bharat24Taas" target="_blank">Facebook</a>
<a href="https://www.instagram.com/Bharat24Taas" target="_blank">Instagram</a>
<a href="https://x.com/Bharat24Taas" target="_blank">X</a>
</div>

<div class="breaking">📰 तुमच्या परिसरातील बातमी थेट Bharat 24 Taas पर्यंत पोहोचवा</div>

<div class="container">
<div class="card">
<h2>Citizen Reporter Form</h2>

<div class="notice">
फॉर्म सबमिट झाल्यानंतर बातमी Google Sheet मध्ये सेव होईल. त्यानंतर Group मध्ये फोटो/व्हिडिओ पाठवा.
</div>

<form id="newsForm">
<label>Name</label>
<input type="text" id="name" required>

<label>Mobile</label>
<input type="text" id="mobile" required>

<label>Location</label>
<input type="text" id="location" required>

<label>Category</label>
<select id="category" required>
<option value="">Select Category</option>
<option>Accident</option>
<option>Crime</option>
<option>Politics</option>
<option>Social</option>
<option>Education</option>
<option>Health</option>
<option>Sports</option>
<option>Other</option>
</select>

<label>News Details</label>
<textarea id="details" required></textarea>

<button type="submit">Submit News</button>
</form>
</div>
</div>

<div class="footer">
<p><a href="https://www.bharat24taas.com" target="_blank">www.bharat24taas.com</a></p>
<p>@Bharat24Taas</p>
</div>

<script>
const scriptURL="https://script.google.com/macros/s/AKfycbwAqJDOMWWOgVgpDuC2srT2Eu4w8eUGh-iDWLIv6ywjFOa6mhbsYl_S36snOOgt0C8o/exec";

document.getElementById("newsForm").addEventListener("submit",async function(e){
e.preventDefault();

const newsText =
`📰 BHARAT 24 TAAS CITIZEN REPORTER

Date: ${new Date().toLocaleString("en-IN")}

Name: ${document.getElementById("name").value}

Mobile: ${document.getElementById("mobile").value}

Location: ${document.getElementById("location").value}

Category: ${document.getElementById("category").value}

News Details:
${document.getElementById("details").value}`;

const payload={
name:document.getElementById("name").value,
mobile:document.getElementById("mobile").value,
location:document.getElementById("location").value,
category:document.getElementById("category").value,
newsDetails:document.getElementById("details").value
};

try{
await fetch(scriptURL,{
method:"POST",
mode:"no-cors",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

document.body.innerHTML=`
<div style="max-width:700px;margin:50px auto;padding:30px;background:white;border-radius:15px;text-align:center;box-shadow:0 5px 15px rgba(0,0,0,.15);font-family:Arial">

<h1 style="color:#0a8f3d;">
✅ बातमी यशस्वीरित्या प्राप्त झाली
</h1>

<p style="margin-top:15px;font-size:18px;">
आपली बातमी Bharat 24 Taas कडे यशस्वीरित्या पोहोचली आहे.
</p>

<div style="background:#fff3cd;border:3px solid #ff9800;padding:20px;border-radius:10px;margin-top:20px;text-align:left;">

<h3 style="color:#d32f2f;text-align:center;margin-bottom:15px;">
⚠️ महत्त्वाच्या सूचना
</h3>

<p style="font-size:16px;line-height:1.8;font-weight:bold;">

✓ आपण भरलेली बातमी आधीच Copy झाली आहे.<br><br>

✓ खालील बटणावर क्लिक करून Bharat 24 Taas Citizen Reporter WhatsApp Group उघडा.<br><br>

✓ जर आपण अद्याप Group मध्ये सहभागी नसाल तर Join Group वर क्लिक करा.<br><br>

✓ Group मध्ये Message Box मध्ये Long Press करून Paste करा व Send करा.<br><br>

✓ संबंधित बातमीचे फोटो किंवा व्हिडिओ देखील त्याच Group मध्ये पाठवा.

</p>

</div>

<button id="sendBtn"
style="width:100%;padding:16px;background:#25D366;color:white;border:none;border-radius:8px;font-size:18px;font-weight:bold;margin-top:20px;cursor:pointer;">
📷 संबंधित बातमीचे फोटो किंवा व्हिडिओ टाकण्यासाठी येथे क्लिक करा
</button>

</div>
`;
document.getElementById("sendBtn").onclick=function(){
navigator.clipboard.writeText(newsText);
window.open("https://chat.whatsapp.com/IpEn5da0WjvCp4y6QLurCg?s=cl&p=a&ilr=0&amv=1","_blank");
};

}catch(err){
alert("Submission failed.");
console.log(err);
}
});
</script>

</body>
</html>
