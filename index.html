<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bharat 24 Taas Citizen Reporter</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
padding:0;
}

.header{
background:#d40000;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
margin-top:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,
select,
textarea{

width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;

}

textarea{
height:150px;
}

button{

background:#d40000;
color:white;
padding:15px;
width:100%;
border:none;
border-radius:6px;
margin-top:20px;
font-size:18px;
cursor:pointer;

}

button:hover{
background:#a50000;
}

.success{
text-align:center;
color:green;
font-weight:bold;
margin-top:15px;
}

</style>

</head>

<body>

<div class="header">

<h1>Bharat 24 Taas</h1>

<p>Citizen Reporter Portal</p>

</div>

<div class="container">

<form id="newsForm">

<label>Name</label>
<input type="text" id="name" required>

<label>Mobile</label>
<input type="text" id="mobile" required>

<label>Location</label>
<input type="text" id="location" required>

<label>Category</label>

<select id="category">

<option>Accident</option>

<option>Crime</option>

<option>Politics</option>

<option>Social</option>

<option>Education</option>

<option>Health</option>

<option>Sports</option>

<option>Other</option>

</select>

<label>News Details</label>

<textarea id="details" required></textarea>

<label>Photo / Video Drive Link</label>

<input type="text" id="media">

<button type="submit">

Submit News

</button>

</form>

<div class="success" id="msg"></div>

</div>

<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycbzyl6QsNi74-qzMu9l6nCRf3A9QO5HwEIhvUT1qMmynggg4ZgV1kGlvmT55QJC8SgfY/exec";

document
.getElementById("newsForm")
.addEventListener("submit",function(e){

e.preventDefault();

fetch(scriptURL,{

method:"POST",

body:JSON.stringify({

name:
document.getElementById("name").value,

mobile:
document.getElementById("mobile").value,

location:
document.getElementById("location").value,

category:
document.getElementById("category").value,

details:
document.getElementById("details").value,

media:
document.getElementById("media").value

})

})

.then(res=>{

document.getElementById("msg").innerHTML =
"News Submitted Successfully";

document.getElementById("newsForm").reset();

});

});

</script>

</body>

</html>
