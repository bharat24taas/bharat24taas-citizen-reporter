<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Bharat 24 Taas Citizen Reporter</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:0;
}

.header{
background:#d40000;
color:#fff;
text-align:center;
padding:20px;
}

.container{
max-width:800px;
background:#fff;
margin:20px auto;
padding:20px;
border-radius:10px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

textarea{
height:150px;
}

button{
width:100%;
padding:15px;
background:#d40000;
color:white;
border:none;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#b00000;
}

#msg{
margin-top:15px;
font-weight:bold;
text-align:center;
}

</style>
</head>

<body>

<div class="header">
<h1>Bharat 24 Taas</h1>
<p>Citizen Reporter Portal</p>
</div>

<div class="container">

<form id="newsForm">

<label>Name</label>
<input type="text" id="name" required>

<label>Mobile</label>
<input type="text" id="mobile" required>

<label>Location</label>
<input type="text" id="location" required>

<label>Category</label>

<select id="category">

<option>Accident</option>
<option>Crime</option>
<option>Politics</option>
<option>Social</option>
<option>Education</option>
<option>Health</option>
<option>Sports</option>
<option>Other</option>

</select>

<label>News Details</label>
<textarea id="details" required></textarea>

<label>Upload Photo</label>
<input type="file" id="photo" accept="image/*">

<label>Upload Video</label>
<input type="file" id="video" accept="video/*">

<button type="submit">
Submit News
</button>

</form>

<div id="msg"></div>

</div>

<script>

const scriptURL =
"PASTE_YOUR_NEW_APPS_SCRIPT_URL_HERE";

function fileToBase64(file){

return new Promise((resolve,reject)=>{

const reader = new FileReader();

reader.onload = ()=>{

resolve({
fileName:file.name,
mimeType:file.type,
data:reader.result.split(',')[1]
});

};

reader.onerror = reject;

reader.readAsDataURL(file);

});

}

document.getElementById("newsForm")
.addEventListener("submit",async function(e){

e.preventDefault();

document.getElementById("msg").innerHTML =
"Uploading... Please Wait";

let photoFile = null;
let videoFile = null;

const photo =
document.getElementById("photo").files[0];

const video =
document.getElementById("video").files[0];

if(photo){
photoFile = await fileToBase64(photo);
}

if(video){
videoFile = await fileToBase64(video);
}

const payload = {

name:
document.getElementById("name").value,

mobile:
document.getElementById("mobile").value,

location:
document.getElementById("location").value,

category:
document.getElementById("category").value,

newsDetails:
document.getElementById("details").value,

photoFile:photoFile,

videoFile:videoFile

};

fetch(scriptURL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(payload)

})
.then(r=>r.json())
.then(data=>{

document.getElementById("msg").innerHTML =
"News Submitted Successfully";

document.getElementById("newsForm").reset();

})
.catch(err=>{

document.getElementById("msg").innerHTML =
"Upload Failed";

console.log(err);

});

});

</script>

</body>
</html>
